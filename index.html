<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doruk Futbol Games</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#000;
    color:white;
    text-align:center;
    overflow-x:hidden;
}

/* SPLASH */
#splash{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:#0ff;
    text-shadow:0 0 20px #0ff;
    animation:fade 2s forwards 2s;
}
@keyframes fade{
    to{opacity:0;visibility:hidden;}
}

/* NEON */
.neon{
    color:#0ff;
    text-shadow:0 0 20px #0ff;
}

.screen{display:none;padding-top:20px;}
.active{display:block;}

button{
    padding:12px 25px;
    margin:10px;
    border:2px solid #0ff;
    background:black;
    color:#0ff;
    border-radius:10px;
    cursor:pointer;
}
button:hover{
    background:#0ff;
    color:black;
    transform:scale(1.05);
}

/* GAME */
img{
    width:160px;
    margin:20px;
    filter:drop-shadow(0 0 10px #0ff);
}

/* XP BAR */
.bar-bg{width:200px;height:10px;background:#333;margin:auto;}
.bar{height:10px;background:#0ff;width:0%;}

/* LEADERBOARD */
.rank{
    width:250px;
    margin:5px auto;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #0ff;
}

/* NOTIF */
#notif{
    position:fixed;
    top:10px;
    right:10px;
    background:#0ff;
    color:black;
    padding:10px;
    display:none;
}
</style>
</head>

<body>

<div id="splash">⚽ Doruk Futbol Games ⚽</div>
<div id="notif"></div>

<h1 class="neon">Doruk Futbol Games</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<button onclick="go('game')">OYNA</button>
<button onclick="go('profile')">PROFİL</button>
<button onclick="go('leaderboard')">SIRALAMA</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<img id="logo">
<br>
<input id="answer" placeholder="Takım adı">
<br>
<button onclick="check()">Cevapla</button>
<button onclick="skip()">Geç</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<h2 id="username">Doruk</h2>

<p>Level: <span id="level">0</span></p>
<p>XP: <span id="xp">0</span></p>

<div class="bar-bg">
<div class="bar" id="xpBar"></div>
</div>

<h3>Arkadaşlar</h3>
<div id="friends"></div>

<input id="friendInput" placeholder="Arkadaş ekle">
<button onclick="addFriend()">Ekle</button>

<br>
<button onclick="go('menu')">Geri</button>
</div>

<!-- LEADERBOARD -->
<div id="leaderboard" class="screen">
<h2>Global Sıralama 🌍</h2>
<div id="rankList"></div>
<button onclick="go('menu')">Geri</button>
</div>

<!-- SES -->
<audio id="ok" src="https://assets.mixkit.co/sfx/preview/mixkit-game-success-alert-2039.mp3"></audio>
<audio id="no" src="https://assets.mixkit.co/sfx/preview/mixkit-wrong-answer-fail-notification-946.mp3"></audio>
<audio id="click" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>

<script>
/* FIREBASE (leaderboard + friends) */
const firebaseConfig = {
  apiKey:"API_KEY",
  authDomain:"PROJECT.firebaseapp.com",
  projectId:"PROJECT"
};

/* ⚠️ Firebase burada opsiyonel bırakıldı (çalışması için eklemen gerekir) */

/* NAV */
function go(s){
    click.play();
    document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));
    document.getElementById(s).classList.add("active");
}

/* USER */
let user = {xp:0,level:0,friends:[]};

/* 200 TAKIM */
let allTeams = [];

const leagues=[39,140,135,78,61,203,88,94,197,253];

async function getTeams(id){
    let r = await fetch(`https://v3.football.api-sports.io/teams?league=${id}&season=2023`,{
        headers:{"x-apisports-key":"API_KEY"}
    });

    let d = await r.json();

    return d.response.map(t=>({
        name:t.team.name,
        img:t.team.logo
    }));
}

async function loadTeams(){
    for(let l of leagues){
        let t = await getTeams(l);
        allTeams.push(...t);
        if(allTeams.length>=200) break;
    }

    allTeams = allTeams.slice(0,200);
    startGame();
}

/* GAME */
let q=[];
let i=0;

function startGame(){
    q = allTeams.sort(()=>Math.random()-0.5).slice(0,10);
    i=0;
    load();
}

function load(){
    logo.src=q[i].img;
    answer.value="";
}

function check(){
    let v=answer.value.toLowerCase();
    let c=q[i].name.toLowerCase();

    if(v==c){
        ok.play();
        user.xp+=10;
        notify("Doğru +10XP");
    }else{
        no.play();
        notify("Yanlış!");
    }

    update();
    i++;
    if(i>=q.length) i=0;
    load();
}

function skip(){
    i++;
    load();
}

/* XP */
function update(){
    user.level=Math.floor(user.xp/100);
    xp.innerText=user.xp;
    level.innerText=user.level;
    xpBar.style.width=(user.xp%100)+"%";
}

/* FRIENDS */
function addFriend(){
    user.friends.push(friendInput.value);
    renderFriends();
}

function renderFriends(){
    friends.innerHTML="";
    user.friends.forEach(f=>{
        friends.innerHTML+=`<div>👤 ${f}</div>`;
    });
}

/* NOTIF */
function notify(t){
    notif.style.display="block";
    notif.innerText=t;
    setTimeout(()=>notif.style.display="none",1500);
}

/* INIT */
update();
loadTeams();
</script>

</body>
</html>
