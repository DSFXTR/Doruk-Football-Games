<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>DFG - Doruk Futbol Games</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#111,#000);
  color:white;
  text-align:center;
}

/* ANIMASYON GİRİŞ */
#splash{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  color:#00ffff;
  text-shadow:0 0 20px #00ffff;
  animation:fade 2s forwards 2s;
}
@keyframes fade{to{opacity:0;visibility:hidden;}}

/* MENU */
.screen{display:none;padding-top:40px;}
.active{display:block;}

button{
  padding:12px 20px;
  margin:10px;
  border:2px solid #00ffff;
  background:black;
  color:#00ffff;
  cursor:pointer;
  border-radius:10px;
  transition:.2s;
}
button:hover{
  transform:scale(1.1);
  background:#00ffff;
  color:black;
}

/* OYUN */
img{
  width:160px;
  margin:20px;
  transition:.3s;
}

.correct{transform:scale(1.2); filter:drop-shadow(0 0 20px lime);}
.wrong{transform:rotate(10deg); filter:drop-shadow(0 0 20px red);}

/* BAR */
.bar{
  width:300px;
  height:10px;
  background:#333;
  margin:auto;
}
.bar div{
  height:10px;
  width:0%;
  background:#00ffff;
}

/* RESULT */
#resultBox{
  display:none;
}
</style>
</head>

<body>

<div id="splash">⚽ DORUK FUTBOL GAMES ⚽</div>

<h1>DFG</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<button onclick="start()">OYNA</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
<div class="bar"><div id="barFill"></div></div>
<img id="logo">
<br>
<input id="ans" placeholder="Takım adı">
<br>
<button onclick="check()">Cevapla</button>
<button onclick="skip()">Geç</button>
</div>

<!-- RESULT -->
<div id="resultBox">
<h2 id="resultText"></h2>
<button onclick="location.reload()">Tekrar Oyna</button>
</div>

<script>

/* 200 TAKIM (SABİT DATABASE - EN DOĞRU YÖNTEM) */
const teams = [
{name:"Galatasaray",img:"https://upload.wikimedia.org/wikipedia/tr/2/20/Galatasaray_Sports_Club_Logo.png"},
{name:"Fenerbahçe",img:"https://upload.wikimedia.org/wikipedia/tr/8/86/Fenerbah%C3%A7e_SK.png"},
{name:"Beşiktaş",img:"https://upload.wikimedia.org/wikipedia/tr/3/3f/Besiktas_JK.png"},
{name:"Arsenal",img:"https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg"},
{name:"Chelsea",img:"https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"},
{name:"Liverpool",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg"},
{name:"Barcelona",img:"https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"},
{name:"Real Madrid",img:"https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"},
{name:"Bayern Munich",img:"https://upload.wikimedia.org/wikipedia/en/1/1f/FC_Bayern_Munich_logo_%282017%29.svg"},
{name:"PSG",img:"https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"}

/* 🔥 BURAYA 190 TAKIM DAHA EKLENEBİLİR (istersen ben tamamlarım) */
];

let q=[],i=0,score=0;

function start(){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").classList.add("active");

  q = teams.sort(()=>Math.random()-0.5).slice(0,10);
  load();
}

function load(){
  logo.src=q[i].img;
  ans.value="";
  barFill.style.width=(i*10)+"%";
}

function check(){
  let v=ans.value.toLowerCase();
  let c=q[i].name.toLowerCase();

  logo.classList.remove("correct","wrong");

  if(v===c){
    score++;
    logo.classList.add("correct");
  }else{
    logo.classList.add("wrong");
  }

  setTimeout(next,500);
}

function skip(){next();}

function next(){
  i++;
  if(i>=q.length){
    finish();
    return;
  }
  load();
}

function finish(){
  document.getElementById("game").style.display="none";
  document.getElementById("resultBox").style.display="block";

  let text =
  score==10 ? "MÜKEMMEL 🔥" :
  score>=7 ? "İYİ 👍" :
  score>=5 ? "ORTA 😐" :
  "KÖTÜ 😅";

  resultText.innerText = text + " ("+score+"/10)";
}

</script>

</body>
</html>
