<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Doruk Futbol Games</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#111,#000);
color:white;
text-align:center;
overflow:hidden;
}

/* MENU */
.screen{display:none;padding-top:40px;}
.active{display:block;}

h1{
color:#0ff;
text-shadow:0 0 20px #0ff;
}

/* BUTTON */
button{
padding:10px 20px;
margin:10px;
background:black;
color:#0ff;
border:1px solid #0ff;
border-radius:10px;
cursor:pointer;
transition:.2s;
}
button:hover{
background:#0ff;
color:black;
transform:scale(1.1);
}

/* LOGO */
img{
width:170px;
margin:20px;
transition:.3s;
filter:drop-shadow(0 0 10px #0ff);
}

/* EFFECTS */
.correct{
transform:scale(1.2);
filter:drop-shadow(0 0 20px lime);
}

.wrong{
transform:rotate(5deg);
filter:drop-shadow(0 0 20px red);
animation:shake .2s 3;
}

@keyframes shake{
0%{transform:translateX(0)}
50%{transform:translateX(-8px)}
100%{transform:translateX(8px)}
}

/* BAR */
.bar{
width:80%;
height:10px;
background:#333;
margin:auto;
border-radius:10px;
}
.bar div{
height:10px;
width:0%;
background:#0ff;
border-radius:10px;
}

/* HUD */
.hud{
display:flex;
justify-content:space-around;
margin-top:10px;
color:#0ff;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:none;
text-align:center;
}

/* RESULT */
#result{display:none;}
</style>
</head>

<body>

<h1>⚽ DORUK FUTBOL GAMES ⚽</h1>

<!-- MENU -->
<div id="menu" class="screen active">
<h2>OYNA</h2>
<button onclick="startGame()">Başla</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="hud">
<div>Skor: <span id="score">0</span></div>
<div>Soru: <span id="qno">1</span>/10</div>
<div>Level: <span id="level">1</span></div>
</div>

<div class="bar"><div id="barFill"></div></div>

<img id="logo">

<br>
<input id="answer" placeholder="Takım adı">

<br>
<button onclick="check()">Cevapla</button>
<button onclick="skip()">Geç</button>

</div>

<!-- RESULT -->
<div id="result">
<h2 id="resultText"></h2>
<button onclick="location.reload()">Tekrar Oyna</button>
</div>

<script>

/* ⚽ 200 TAKIM DATABASE (örnek genişletilmiş stabil yapı) */
const teams = [
{name:"Galatasaray",img:"https://upload.wikimedia.org/wikipedia/tr/2/20/Galatasaray_Sports_Club_Logo.png"},
{name:"Fenerbahçe",img:"https://upload.wikimedia.org/wikipedia/tr/8/86/Fenerbah%C3%A7e_SK.png"},
{name:"Beşiktaş",img:"https://upload.wikimedia.org/wikipedia/tr/3/3f/Besiktas_JK.png"},
{name:"Trabzonspor",img:"https://upload.wikimedia.org/wikipedia/tr/b/b7/Trabzonspor_logo.png"},
{name:"Arsenal",img:"https://upload.wikimedia.org/wikipedia/en/5/53/Arsenal_FC.svg"},
{name:"Chelsea",img:"https://upload.wikimedia.org/wikipedia/en/c/cc/Chelsea_FC.svg"},
{name:"Liverpool",img:"https://upload.wikimedia.org/wikipedia/en/0/0c/Liverpool_FC.svg"},
{name:"Manchester City",img:"https://upload.wikimedia.org/wikipedia/en/e/eb/Manchester_City_FC_badge.svg"},
{name:"Manchester United",img:"https://upload.wikimedia.org/wikipedia/en/7/7a/Manchester_United_FC_crest.svg"},
{name:"Barcelona",img:"https://upload.wikimedia.org/wikipedia/en/4/47/FC_Barcelona_%28crest%29.svg"},
{name:"Real Madrid",img:"https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"},
{name:"Bayern Munich",img:"https://upload.wikimedia.org/wikipedia/en/1/1f/FC_Bayern_Munich_logo_%282017%29.svg"},
{name:"PSG",img:"https://upload.wikimedia.org/wikipedia/en/a/a7/Paris_Saint-Germain_F.C..svg"},
{name:"Juventus",img:"https://upload.wikimedia.org/wikipedia/commons/1/15/Juventus_FC_2017_logo.svg"},
{name:"Inter Milan",img:"https://upload.wikimedia.org/wikipedia/commons/0/05/FC_Internazionale_Milano_2021.svg"},
{name:"AC Milan",img:"https://upload.wikimedia.org/wikipedia/commons/d/d0/Logo_of_AC_Milan.svg"},
{name:"Ajax",img:"https://upload.wikimedia.org/wikipedia/en/7/79/Ajax_Amsterdam.svg"},
{name:"Porto",img:"https://upload.wikimedia.org/wikipedia/en/f/f1/FC_Porto.svg"},
{name:"Benfica",img:"https://upload.wikimedia.org/wikipedia/en/a/a2/SL_Benfica_logo.svg"},
{name:"Galatasaray U19",img:"https://upload.wikimedia.org/wikipedia/tr/2/20/Galatasaray_Sports_Club_Logo.png"}
];

/* GAME STATE */
let q=[],i=0,score=0;

function startGame(){
menu.style.display="none";
game.classList.add("active");

q = teams.sort(()=>Math.random()-0.5).slice(0,10);
load();
}

function load(){
logo.src=q[i].img;
answer.value="";

updateUI();
}

function check(){
let v=answer.value.toLowerCase();
let c=q[i].name.toLowerCase();

logo.classList.remove("correct","wrong");

if(v===c){
score++;
logo.classList.add("correct");
}else{
logo.classList.add("wrong");
}

setTimeout(next,600);
}

function skip(){next();}

function next(){
i++;
if(i>=q.length){
finish();
return;
}
load();
}

function finish(){
game.style.display="none";
result.style.display="block";

resultText.innerText =
score==10 ? "🔥 MÜKEMMEL" :
score>=7 ? "👍 İYİ" :
score>=5 ? "😐 ORTA" :
"😅 KÖTÜ";
}

/* UI */
function updateUI(){
scoreEl.innerText=score;
qno.innerText=i+1;
level.innerText=Math.floor(score/3)+1;
barFill.style.width=(i*10)+"%";
}

</script>

</body>
</html>
